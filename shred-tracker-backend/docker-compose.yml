version: '3.8'

services:
  backend:
    build: .
    container_name: shred_tracker_api
    # 映射端口：本地 8000 端口对应容器 8000 端口
    ports:
      - "8000:8000"
    # 挂载卷：实现热重载的核心
    volumes:
      - .:/app
      - ./data:/app/data
    # 环境变量：定义数据库文件存放位置
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/shred.db
    restart: always